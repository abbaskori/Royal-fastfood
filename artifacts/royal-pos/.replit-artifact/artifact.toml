kind = "web"
previewPath = "/"
title = "Baqaa Fast Food POS"
version = "1.0.0"
id = "artifacts/baqaa-pos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23723

[services.development]
run = "pnpm --filter @workspace/baqaa-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/baqaa-pos", "run", "build" ]
publicDir = "artifacts/baqaa-pos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23723"
BASE_PATH = "/"
